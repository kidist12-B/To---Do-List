<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To - Do List</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="container"> 
     <div class="header">
          <h1>To - Do List</h1>
            <p>Stay organized and Prodactive</p>
     </div>
     
     <form action="">
        <div class="Inputtask">
        <input type="text" placeholder="Add new tasks..." id="">
        <button>+ Add</button>
     </div>
    </form>
     
    <div class="stats">
        <div class="card">
            <h1>2</h1>
            <p>Active</p>
        </div>

        <div class="card">
            <h1>1</h1>
            <p>completed</p>
        </div>

<div class="card">
            <h1>3</h1>
            <p>completed</p>
        </div>

    </div>

    <!--second part-->

    <div class="tasks" >

        <div class="task">
            <input type="checkbox" name="" id="checkbox">
            <p>welcome to your to do list!</p>
        </div>


        <div class="task">
            <input type="checkbox" name="" id="checkbox">
            <p>check the checkbox to mark as completed</p>
        </div>
        

        <div class="task">
            <input type="checkbox" name="" id="checkbox">
            <p>have to delete items</p>
        </div>

    </div>

</div>
</body>
</html>
